<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contrario Premium</title>

<style>
:root {
    --primary: #6366f1;
    --secondary: #22c55e;
    --warning: #f59e0b;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #1e293b, #0f172a);
    color: white;
}

/* ✅ HEADER FIX */
.header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 15px 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
}

.logo {
    height: 110px;
}

.title {
    font-size: 24px;
    font-weight: bold;
    opacity: 0.9;
    text-align: center;
    flex: 1;
}

/* ✅ CONTAINER */
.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
    text-align: center;
}

/* ✅ CARD */
.card {
    margin-top: 25px;
    padding: 30px;
    border-radius: 18px;
    background: rgba(255,255,255,0.06);
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}

/* ✅ THEME (plus visible) */
.theme {
    display: inline-block;
    padding: 8px 16px;
    background: var(--primary);
    border-radius: 20px;
    font-size: 15px;
    margin-bottom: 10px;
}

/* ✅ ENIGME (BEAUCOUP PLUS GROS) */
.enigme {
    font-size: 28px;
    font-weight: 700;
    margin: 20px 0;
}

/* ✅ BOUTONS */
button {
    border: none;
    padding: 12px 18px;
    margin: 6px;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}

.btn-main { background: var(--primary); color: white; }
.btn-indice { background: var(--warning); color: white; }
.btn-reponse { background: var(--secondary); color: white; }

button:hover {
    transform: scale(1.05);
}

/* ✅ INFO */
.info {
    margin-top: 15px;
    font-size: 20px;
}

/* ✅ HISTO */
.history {
    margin-top: 30px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 8px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

th {
    background: rgba(255,255,255,0.1);
}
</style>
</head>

<body>

<!-- ✅ HEADER AVEC 2 LOGOS -->
<div class="header">
    <img src="logo-dpdj.png" class="logo">

    <div class="title">Contrario</div>

    <img src="contrario.png" class="logo">
</div>

<div class="container">

    <button class="btn-main" onclick="nouvelleEnigme()">🎲 Nouvelle énigme</button>

    <div class="card">
        <div id="theme" class="theme"></div>
        <div id="enigme" class="enigme"></div>

        <div>
            <button class="btn-indice" onclick="showIndice()">🔍 Indice</button>
            <button class="btn-reponse" onclick="showReponse()">✅ Réponse</button>
        </div>

        <div id="indice" class="info"></div>
        <div id="reponse" class="info"></div>
    </div>

    <div class="history">
        <h3>📜 Historique</h3>
        <table id="historyTable">
            <thead>
                <tr>
                    <th>Thème</th>
                    <th>Énigme</th>
                    <th>Indice</th>
                    <th>Réponse</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

</div>

<script>

let data = [];
let used = [];
let current = null;

// Load data
fetch('data_inputs.txt')
.then(r => r.text())
.then(text => {
    data = text.split('\n').slice(1).map(l => {
        let p = l.split(';');
        return { theme:p[0], enigme:p[1], indice:p[2], reponse:p[3] };
    });

    loadHistory();
});

// NEW QUESTION
function nouvelleEnigme(){
    if(used.length === data.length){
        alert("Plus d'énigmes !");
        return;
    }

    let i;
    do { i = Math.floor(Math.random()*data.length); }
    while(used.includes(i));

    used.push(i);
    current = data[i];

    theme.innerText = current.theme;
    enigme.innerText = current.enigme;

    resetInfo();
}

function showIndice(){
    if(current){
        indice.innerText = "🔍 " + current.indice;
    }
}

function showReponse(){
    if(current){
        reponse.innerText = "✅ " + current.reponse;
        addHistory(current);
    }
}

function addHistory(item){
    let row = historyTable.querySelector("tbody").insertRow();
    row.insertCell(0).innerText = item.theme;
    row.insertCell(1).innerText = item.enigme;
    row.insertCell(2).innerText = item.indice;
    row.insertCell(3).innerText = item.reponse;
}

</script>

</body>
</html>
